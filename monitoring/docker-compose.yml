services:

  # OpenTelemetry Collector
  # Spring Boot에서 OTLP로 보낸 메트릭/로그/트레이싱을 받아서 각 백엔드로 라우팅
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    ports:
      - "4317:4317"   # gRPC OTLP  ← Spring Boot가 트레이스 전송
      - "4318:4318"   # HTTP OTLP  ← Spring Boot가 메트릭/로그 전송
      - "8889:8889"   # Prometheus가 이 endpoint를 scrape
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    command: [ "--config=/etc/otel-collector-config.yml" ]
    depends_on:
      - loki
      - tempo

  # Prometheus - 메트릭 저장 (otel-collector:8889 를 scrape)
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - otel-collector

  # Loki - 로그 저장 (otel-collector가 OTLP HTTP로 push)
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml
      - loki_data:/loki
    command: [ "-config.file=/etc/loki/config.yml" ]

  # Tempo - 트레이싱 저장 (otel-collector가 gRPC로 push)
  tempo:
    image: grafana/tempo:2.5.0
    ports:
      - "3200:3200"   # HTTP API (Grafana datasource용)
    volumes:
      - ./tempo-config.yml:/etc/tempo/config.yml
      - tempo_data:/var/tempo
    command: [ "-config.file=/etc/tempo/config.yml" ]

  # Grafana - 메트릭/로그/트레이싱 통합 시각화
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
