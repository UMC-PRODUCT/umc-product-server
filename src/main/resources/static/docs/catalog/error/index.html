<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UMC PRODUCT ErrorCode Catalog</title>
    <link href="/umc-logo.svg" rel="icon" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg: #ffffff;
            --panel: #ffffff;
            --panel-soft: #f1f5f9;
            --border: #e2e8f0;
            --border-strong: #b9c5d6;
            --text: #111827;
            --muted: #64748b;
            --muted-strong: #475569;
            --accent: #2563eb;
            --accent-strong: #1d4ed8;
            --success: #047857;
            --danger: #b42318;
            --warning: #b45309;
            --code-bg: #edf2f7;
            --table-head: #eef3f9;
            --shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            min-height: 64px;
            padding: 12px clamp(16px, 4vw, 40px);
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
        }

        .brand-mark img {
            width: 23px;
            height: 23px;
        }

        .brand h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 750;
            letter-spacing: 0;
        }

        .brand p {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        nav a {
            color: var(--muted);
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 8px 11px;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
        }

        nav a:hover,
        nav a.active {
            color: var(--accent);
            border-color: #bfdbfe;
            background: #eff6ff;
        }

        .page {
            width: min(1440px, calc(100vw - 48px));
            margin: 0 auto 56px;
        }

        .hero {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            padding: 28px 0 18px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 8px;
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 750;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .hero h2 {
            margin: 0;
            border: 0;
            padding: 0;
            color: var(--text);
            font-size: 30px;
            line-height: 1.12;
            font-weight: 780;
            letter-spacing: 0;
        }

        .hero-copy {
            max-width: 720px;
            margin: 8px 0 0;
            color: var(--muted-strong);
            font-size: 15px;
        }

        .hero-aside {
            border-left: 1px solid var(--border);
            padding: 4px 0 4px 18px;
            min-width: 300px;
        }

        .hero-aside strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .hero-aside p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .toolbar {
            position: sticky;
            top: 64px;
            z-index: 15;
            display: grid;
            grid-template-columns: minmax(260px, 1fr) auto;
            gap: 14px;
            align-items: center;
            margin: 8px 0 22px;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
        }

        .search {
            position: relative;
            min-width: 0;
        }

        .search input {
            width: 100%;
            min-height: 40px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 14px 0 42px;
            background: #fff;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        .search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        .search::before {
            content: "";
            position: absolute;
            left: 15px;
            top: 50%;
            width: 14px;
            height: 14px;
            border: 2px solid var(--muted);
            border-radius: 50%;
            transform: translateY(-56%);
        }

        .search::after {
            content: "";
            position: absolute;
            left: 28px;
            top: 27px;
            width: 8px;
            height: 2px;
            border-radius: 999px;
            background: var(--muted);
            transform: rotate(45deg);
        }

        .result-count {
            color: var(--muted);
            font-size: 14px;
            white-space: nowrap;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, max-content);
            gap: 32px;
            margin: 0 0 18px;
            padding: 12px 0 18px;
            border-bottom: 1px solid var(--border);
        }

        .stat {
            min-width: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            padding: 0;
        }

        .stat span {
            display: block;
            color: var(--muted);
            font-size: 13px;
        }

        .stat strong {
            display: block;
            margin-top: 6px;
            font-size: 22px;
            line-height: 1;
            letter-spacing: 0;
        }

        main {
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            overflow: visible;
        }

        .loading,
        .error {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
        }

        .error {
            color: var(--danger);
        }

        .no-results {
            display: none;
            margin: 18px 0 0;
            padding: 14px 16px;
            border: 1px solid #fed7aa;
            border-radius: 8px;
            background: #fff7ed;
            color: #9a3412;
            font-size: 14px;
        }

        h1,
        h2,
        h3 {
            line-height: 1.25;
            letter-spacing: 0;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        h2 {
            margin: 30px 0 10px;
            padding: 0;
            border: 0;
            background: transparent;
            color: var(--text);
            font-size: 18px;
            font-weight: 750;
        }

        p {
            margin: 10px 0;
            color: var(--muted-strong);
        }

        a {
            color: var(--accent);
        }

        blockquote {
            margin: 14px 0 22px;
            padding: 0 0 0 12px;
            border: 0;
            border-left: 3px solid #60a5fa;
            border-radius: 0;
            background: transparent;
            color: var(--muted);
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: var(--code-bg);
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.92em;
        }

        .table-wrap {
            width: 100%;
            margin: 10px 0 34px;
            border: 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-radius: 0;
            overflow-x: auto;
            overflow-y: visible;
            background: transparent;
        }

        .catalog-table {
            width: 100%;
            min-width: 1240px;
            table-layout: fixed;
            border-collapse: collapse;
            margin: 0;
            font-size: 13px;
            background: transparent;
        }

        th,
        td {
            border-bottom: 1px solid var(--border);
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: rgba(248, 250, 252, 0.96);
            color: var(--muted-strong);
            font-size: 12px;
            font-weight: 750;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        td {
            color: var(--text);
            overflow-wrap: anywhere;
            word-break: keep-all;
        }

        tbody tr:hover td {
            background: #f8fafc;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        td:nth-child(1) {
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            width: 64px;
        }

        .catalog-table th:nth-child(1),
        .catalog-table td:nth-child(1) {
            width: 56px;
            text-align: right;
        }

        .catalog-table th:nth-child(2),
        .catalog-table td:nth-child(2) {
            width: 92px;
        }

        .catalog-table th:nth-child(3),
        .catalog-table td:nth-child(3) {
            width: 180px;
        }

        .catalog-table th:nth-child(4),
        .catalog-table td:nth-child(4) {
            width: 90px;
        }

        .catalog-table th:nth-child(5),
        .catalog-table td:nth-child(5) {
            width: 430px;
        }

        .catalog-table th:nth-child(6),
        .catalog-table td:nth-child(6) {
            width: auto;
        }

        .catalog-table th:nth-child(7),
        .catalog-table td:nth-child(7) {
            width: 112px;
            text-align: center;
        }

        .catalog-table th:nth-child(8),
        .catalog-table td:nth-child(8) {
            width: 190px;
        }

        td:nth-child(3) code,
        td:nth-child(5) code,
        td:nth-child(6) code {
            color: #0f172a;
            font-weight: 650;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .source-cell code {
            display: block;
            max-width: 100%;
            overflow: hidden;
            color: var(--muted-strong);
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-cell {
            cursor: pointer;
            position: relative;
            padding-right: 32px;
        }

        .copy-cell:hover {
            background: #eff6ff;
        }

        .copy-cell:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.24);
            outline-offset: -3px;
        }

        .copy-cell.copied {
            background: #f0fdf4;
        }

        .copy-icon {
            position: absolute;
            right: 11px;
            top: 50%;
            display: block;
            width: 13px;
            height: 13px;
            opacity: 0.45;
            transform: translateY(-50%);
        }

        .copy-icon::before,
        .copy-icon::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 9px;
            border: 1.5px solid var(--muted);
            border-radius: 2px;
            background: #ffffff;
        }

        .copy-icon::before {
            left: 1px;
            top: 3px;
        }

        .copy-icon::after {
            left: 4px;
            top: 0;
        }

        .copy-cell:hover .copy-icon,
        .copy-cell:focus-visible .copy-icon {
            opacity: 0.9;
        }

        .copy-toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 30;
            max-width: min(420px, calc(100vw - 32px));
            padding: 10px 12px;
            border: 0;
            border-radius: 8px;
            background: #111827;
            color: #ffffff;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.16s ease, transform 0.16s ease;
        }

        .copy-toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .error-catalog .catalog-table th:nth-child(3),
        .error-catalog .catalog-table td:nth-child(3) {
            width: 180px;
        }

        .error-catalog .catalog-table th:nth-child(4),
        .error-catalog .catalog-table td:nth-child(4) {
            width: 220px;
        }

        .error-catalog .catalog-table th:nth-child(5),
        .error-catalog .catalog-table td:nth-child(5) {
            width: 120px;
        }

        .error-catalog .catalog-table th:nth-child(6),
        .error-catalog .catalog-table td:nth-child(6) {
            width: 170px;
        }

        .error-catalog .catalog-table th:nth-child(7),
        .error-catalog .catalog-table td:nth-child(7) {
            width: auto;
            text-align: left;
        }

        .error-catalog .catalog-table {
            min-width: 1320px;
        }

        .error-catalog .catalog-table td:nth-child(4) code {
            color: #0f172a;
            font-weight: 650;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .is-hidden {
            display: none !important;
        }

        @media (max-width: 720px) {
            header {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 16px;
            }

            .page {
                width: calc(100vw - 24px);
            }

            .hero {
                align-items: stretch;
                flex-direction: column;
                padding: 26px 0 16px;
            }

            .hero-aside {
                border-left: 0;
                border-top: 1px solid var(--border);
                min-width: 0;
                padding: 12px 0 0;
                width: 100%;
            }

            .hero h2 {
                font-size: 40px;
            }

            .hero-copy {
                font-size: 16px;
            }

            .toolbar {
                top: 127px;
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 16px 24px;
            }

            nav {
                justify-content: flex-start;
            }

            main {
                padding: 0;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="error-catalog">
    <header>
        <div class="brand">
            <span class="brand-mark" aria-hidden="true"><img src="/umc-logo.svg" alt=""></span>
            <div>
                <h1>UMC PRODUCT Docs</h1>
                <p>서버 계약을 소스에서 바로 읽어옵니다.</p>
            </div>
        </div>
        <nav aria-label="문서 이동">
            <a href="/docs/catalog/api/" class="">API</a>
            <a href="/docs/catalog/error/" class="active">ErrorCode</a>
            <a href="catalog.md">Markdown</a>
            <a href="catalog.json">JSON</a>
        </nav>
    </header>
    <div class="page">
        <section class="hero" aria-labelledby="catalog-title">
            <div>
                <p class="eyebrow">Failure Contract</p>
                <h2 id="catalog-title">ErrorCode 카탈로그</h2>
                <p class="hero-copy">클라이언트와 서버가 함께 보는 실패 응답 계약입니다.</p>
            </div>
            <aside class="hero-aside">
                <strong>자동 생성 문서</strong>
                <p>소스 변경 후 `./gradlew generateDocumentationCatalogs`로 갱신합니다.</p>
            </aside>
        </section>
        <section class="stats" id="stats" aria-label="카탈로그 요약"></section>
        <section class="toolbar" aria-label="카탈로그 검색">
            <label class="search" for="catalog-search">
                <input id="catalog-search" type="search" placeholder="도메인, ErrorCode, HTTP status, 메시지로 검색" autocomplete="off">
            </label>
            <span class="result-count" id="result-count"></span>
        </section>
        <main id="content">
            <p class="loading">카탈로그를 불러오는 중입니다.</p>
        </main>
        <p class="no-results" id="no-results">일치하는 ErrorCode가 없습니다.</p>
    </div>
    <div class="copy-toast" id="copy-toast" role="status" aria-live="polite"></div>
    <script src="/webjars/markdown-it/14.1.0/dist/markdown-it.min.js"></script>
    <script>
        const content = document.getElementById("content");
        const stats = document.getElementById("stats");
        const searchInput = document.getElementById("catalog-search");
        const resultCount = document.getElementById("result-count");
        const noResults = document.getElementById("no-results");
        const copyToast = document.getElementById("copy-toast");
        const markdownSource = "catalog.md";
        const jsonSource = "catalog.json";
        const pageKind = "error";
        const md = window.markdownit({
            html: false,
            linkify: true,
            typographer: false
        });

        function fetchText(path) {
            return fetch(path, { cache: "no-cache" }).then((response) => {
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                return response.text();
            });
        }

        function fetchJson(path) {
            return fetch(path, { cache: "no-cache" }).then((response) => {
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                return response.json();
            });
        }

        function uniqueCount(rows, key) {
            return new Set(rows.map((row) => row[key]).filter(Boolean)).size;
        }

        function renderStats(rows) {
            const values = pageKind === "api"
                ? [
                    ["등록된 API", rows.length],
                    ["도메인", uniqueCount(rows, "domain")],
                    ["ID 미지정", rows.filter((row) => row.apiId === "<미지정>").length],
                    ["Deprecated", rows.filter((row) => row.deprecated).length]
                ]
                : [
                    ["ErrorCode", rows.length],
                    ["도메인", uniqueCount(rows, "domain")],
                    ["HTTP Status", uniqueCount(rows, "httpStatus")],
                    ["Enum", uniqueCount(rows, "enumName")]
                ];

            stats.innerHTML = values.map((item) => (
                '<article class="stat"><span>' + item[0] + '</span><strong>' + item[1].toLocaleString("ko-KR") + '</strong></article>'
            )).join("");
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }

            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
            return Promise.resolve();
        }

        function markCopied(cell, value) {
            cell.classList.add("copied");
            window.setTimeout(() => cell.classList.remove("copied"), 900);
            copyToast.textContent = "복사했습니다: " + value;
            copyToast.classList.add("visible");
            window.clearTimeout(copyToast.hideTimer);
            copyToast.hideTimer = window.setTimeout(() => copyToast.classList.remove("visible"), 1400);
        }

        function bindCopyCell(cell, value) {
            if (!value) {
                return;
            }

            cell.classList.add("copy-cell");
            cell.dataset.copyValue = value;
            cell.tabIndex = 0;
            cell.setAttribute("role", "button");
            cell.setAttribute("aria-label", value + " 복사");
            cell.title = value + " 복사";
            if (!cell.querySelector(".copy-icon")) {
                const icon = document.createElement("span");
                icon.className = "copy-icon";
                icon.setAttribute("aria-hidden", "true");
                cell.appendChild(icon);
            }

            const handleCopy = () => {
                copyToClipboard(value).then(() => markCopied(cell, value));
            };

            cell.addEventListener("click", handleCopy);
            cell.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    handleCopy();
                }
            });
        }

        function enhanceTables() {
            const firstHeading = content.querySelector("h1");
            if (firstHeading) {
                firstHeading.remove();
            }

            content.querySelectorAll("table").forEach((table) => {
                table.classList.add("catalog-table");
                const headers = Array.from(table.querySelectorAll("thead th"))
                    .map((cell) => cell.textContent.trim().toLowerCase());
                const copyColumnIndexes = headers
                    .map((header, index) => ({ header, index }))
                    .filter(({ header }) => ["api id", "endpoint", "source"].includes(header))
                    .map(({ index }) => index);
                const wrapper = document.createElement("div");
                wrapper.className = "table-wrap";
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);

                table.querySelectorAll("tbody tr").forEach((row) => {
                    row.dataset.search = row.textContent.toLowerCase();
                    const sourceCell = row.cells[row.cells.length - 1];
                    const sourceCode = sourceCell?.querySelector("code");
                    if (sourceCell && sourceCode) {
                        const fullSource = sourceCode.textContent.trim();
                        sourceCell.classList.add("source-cell");
                        sourceCode.title = fullSource;
                        sourceCode.textContent = fullSource.split("/").pop() || fullSource;
                    }

                    copyColumnIndexes.forEach((index) => {
                        const cell = row.cells[index];
                        if (!cell) {
                            return;
                        }

                        const code = cell.querySelector("code");
                        bindCopyCell(cell, code?.title || code?.textContent.trim() || cell.textContent.trim());
                    });
                });
            });
        }

        function updateResultCount(visible, total) {
            resultCount.textContent = visible.toLocaleString("ko-KR") + " / " + total.toLocaleString("ko-KR") + "개 표시";
            noResults.style.display = visible === 0 ? "block" : "none";
        }

        function applyFilter() {
            const query = searchInput.value.trim().toLowerCase();
            let total = 0;
            let visible = 0;

            content.querySelectorAll(".catalog-table tbody tr").forEach((row) => {
                total += 1;
                const matched = query === "" || row.dataset.search.includes(query);
                row.classList.toggle("is-hidden", !matched);
                if (matched) {
                    visible += 1;
                }
            });

            content.querySelectorAll(".table-wrap").forEach((wrapper) => {
                const visibleRows = wrapper.querySelectorAll("tbody tr:not(.is-hidden)").length;
                wrapper.classList.toggle("is-hidden", visibleRows === 0 && query !== "");
                const heading = wrapper.previousElementSibling;
                if (heading && heading.tagName === "H2") {
                    heading.classList.toggle("is-hidden", visibleRows === 0 && query !== "");
                }
            });

            updateResultCount(visible, total);
        }

        Promise.all([fetchText(markdownSource), fetchJson(jsonSource)])
            .then(([markdown, rows]) => {
                content.innerHTML = md.render(markdown);
                renderStats(rows);
                enhanceTables();
                applyFilter();
                searchInput.addEventListener("input", applyFilter);
            })
            .catch((error) => {
                content.innerHTML = '<p class="error">카탈로그를 불러오지 못했습니다. ' + error.message + '</p>';
                stats.innerHTML = "";
                updateResultCount(0, 0);
            });
    </script>
</body>
</html>
