<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4 landscape; margin: 22mm; }
        body {
            font-family: "Noto Sans CJK KR", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
            color: #1c2430;
            margin: 0;
        }
        .certificate {
            border: 6px solid #163a5f;
            height: 145mm;
            padding: 18mm 22mm;
            position: relative;
        }
        .eyebrow {
            font-size: 15px;
            letter-spacing: 0;
            color: #506070;
            text-align: center;
        }
        h1 {
            font-size: 42px;
            margin: 10mm 0 9mm;
            text-align: center;
            letter-spacing: 0;
        }
        .recipient {
            font-size: 23px;
            line-height: 1.8;
            margin: 0 auto 9mm;
            width: 78%;
        }
        .body-copy {
            font-size: 20px;
            line-height: 1.75;
            margin: 0 auto;
            text-align: center;
            width: 84%;
        }
        .issued {
            font-size: 18px;
            margin-top: 14mm;
            text-align: center;
        }
        .issuer {
            font-size: 25px;
            font-weight: 700;
            margin-top: 8mm;
            text-align: center;
        }
        .meta {
            bottom: 12mm;
            color: #4b5868;
            font-size: 12px;
            left: 22mm;
            line-height: 1.65;
            position: absolute;
        }
        .qr {
            bottom: 12mm;
            position: absolute;
            right: 22mm;
            text-align: center;
        }
        .qr img {
            height: 28mm;
            width: 28mm;
        }
        .qr div {
            color: #4b5868;
            font-size: 10px;
            margin-top: 2mm;
        }
    </style>
</head>
<body>
<section class="certificate">
    <div class="eyebrow" th:text="${issuerName}">University MakeUs Challenge</div>
    <h1 th:text="${typeName}">수료증</h1>
    <div class="recipient">
        성명: <strong th:text="${recipientName}">홍길동</strong><br/>
        소속: <span th:text="${recipientSchoolName ?: 'UMC'}">UMC</span><br/>
        기수: <span th:text="${gisuGeneration}">0</span>기
    </div>
    <p class="body-copy">
        위 사람은 UMC <span th:text="${gisuGeneration}">0</span>기 활동 과정을 성실히 이수하였기에<br/>
        이 증서를 발급합니다.
    </p>
    <div class="issued" th:text="${issuedDate}">2026년 07월 01일</div>
    <div class="issuer" th:text="${issuerName}">University MakeUs Challenge</div>
    <div class="meta">
        일련번호: <span th:text="${serialNumber}">UMC-CMP-00000000-ABCDEFGH</span><br/>
        유효기간: 발급일로부터 <span th:text="${expiresDate}">2027년 07월 01일</span>까지<br/>
        검증 URL: <span th:text="${verificationUrl}">/api/v1/certificates/verify</span>
    </div>
    <div class="qr">
        <img th:src="${qrCodeDataUri}" alt="verification QR"/>
        <div>QR 진위 확인</div>
    </div>
</section>
</body>
</html>
