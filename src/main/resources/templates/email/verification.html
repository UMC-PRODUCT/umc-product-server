<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>이메일 인증</title>
</head>
<body
    style="font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f6f7f7; color: #161919;">

<div style="background-color: #f6f7f7; padding: 40px 16px;">
    <table cellpadding="0"
           cellspacing="0"
           role="presentation"
           style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-collapse: collapse; border-radius: 16px; overflow: hidden; border: 1px solid #eceeee;"
           width="100%">

        <!-- Header -->
        <tr>
            <td style="padding: 40px 40px 28px 40px; text-align: center; background-color: #ffffff;">
                <span
                    style="font-weight: 700; font-size: 20px; color: #0b6b64; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.3;">
                    University MakeUs Challenge
                </span>
            </td>
        </tr>

        <!-- Divider -->
        <tr>
            <td style="padding: 0 40px;">
                <div style="height: 1px; background-color: #eceeee;"></div>
            </td>
        </tr>

        <!-- Content -->
        <tr>
            <td style="padding: 48px 40px 48px 40px; text-align: center; background-color: #ffffff;">

                <h1 style="font-size: 24px; font-weight: 600; margin: 0 0 12px 0; color: #161919; letter-spacing: -0.02em; line-height: 1.35;">
                    이메일 인증 코드
                </h1>

                <p style="font-size: 15px; font-weight: 400; color: #6f7878; margin: 0 0 40px 0; line-height: 1.5; letter-spacing: -0.01em;">
                    회원가입을 완료하려면 아래 인증 코드를 입력해 주세요.
                </p>

                <!-- Verification Token (카드 제거, 텍스트만) -->
                <p style="
                    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
                    font-size: 56px;
                    font-weight: 700;
                    letter-spacing: 0.5em;
                    color: #0b6b64;
                    margin: 0 0 0 0.5em;
                    line-height: 1.2;
                    text-align: center;"
                   th:text="${verificationToken}">
                    123456
                </p>

                <p style="font-size: 13px; color: #9ca3a3; margin: 24px 0 0 0; letter-spacing: -0.01em; line-height: 1.5;">
                    이 코드는 <span style="color: #404443; font-weight: 500;">10분</span> 뒤에 만료됩니다.
                </p>

            </td>
        </tr>

        <!-- Divider -->
        <tr>
            <td style="padding: 0 40px;">
                <div style="height: 1px; background-color: #eceeee;"></div>
            </td>
        </tr>

        <!-- Footer -->
        <tr>
            <td style="padding: 28px 40px 36px 40px; text-align: center; background-color: #ffffff;">

                <!-- 안내 메시지 -->
                <p style="font-size: 13px; color: #6f7878; margin: 0 0 4px 0; line-height: 1.6; letter-spacing: -0.01em;">
                    본 메일은 발신 전용이며, 서비스 회원가입을 위한 이메일 인증을 위하여 발송하였습니다.
                </p>
                <p style="font-size: 13px; color: #6f7878; margin: 0 0 24px 0; line-height: 1.6; letter-spacing: -0.01em;">
                    직접 요청하신 경우가 아니라면, 이 메일을 무시하셔도 됩니다.
                </p>

                <!-- 링크 영역 -->
                <p style="margin: 0 0 20px 0;">
                    <a href="https://umc.it.kr"
                       style="color: #404443; text-decoration: none; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin: 0 10px;">
                        홈페이지
                    </a>
                    <span style="color: #d3d8d8;">|</span>
                    <a href="https://makeus-challenge.notion.site/2b4b57f4596b80d683ecd6f15f0b0f7c?source=copy_link"
                       style="color: #404443; text-decoration: none; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin: 0 10px;">
                        개인정보 처리방침
                    </a>
                    <span style="color: #d3d8d8;">|</span>
                    <a href="https://makeus-challenge.notion.site/2b4b57f4596b80d683ecd6f15f0b0f7c?source=copy_link"
                       style="color: #404443; text-decoration: none; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin: 0 10px;">
                        서비스 이용약관
                    </a>
                </p>

                <!-- 저작권 -->
                <p style="margin: 0; color: #9ca3a3; font-size: 12px; letter-spacing: 0;">
                    © 2026 University MakeUs Challenge. All rights reserved.
                </p>

            </td>
        </tr>

    </table>
</div>

</body>
</html>
