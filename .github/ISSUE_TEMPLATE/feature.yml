name: "✨ Feature"
description: 새로운 기능을 제안해요
title: "[Feat] "
labels: [ ":sparkles: Feature" ]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 기능 제안에 앞서
        버그가 아닌 **새로운 기능 추가**에 해당하는 경우에만 이 템플릿을 사용해주세요.
        육하원칙에 의거해서 작성해주시면 검토가 빨라집니다.

  - type: textarea
    id: description
    attributes:
      label: 어떤 기능이 필요한가요?
      description: 추가되었으면 하거나, 추가할 기능에 대해서 육하원칙에 의거해서 작성해주세요.
      placeholder: |
        _e.g._ SSOT를 지키고자, 특정 리소스에 대한 권한을 체크할 수 있는 API를 추가했으면 좋겠습니다.
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: 🔧 TODO
      description: 기능 구현을 위해서 필요한 작업들을 작성해주세요. 세부 항목이 너무 커지는 경우, Sub-Issue로 분리해주세요.
      placeholder: |
        _e.g._
        - [ ] Task 1
        - [ ] Task 2
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 📎 참고 자료
      description: 관련 문서, PR, 이슈 링크 등이 있다면 작성해주세요.
      placeholder: |
        _e.g._
        - related to #이슈번호
        - https://...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ 제출 전 확인사항
      options:
        - label: 동일하거나 유사한 이슈가 없는지 확인했습니다.
          required: true
        - label: 적절한 라벨과 Assignee를 설정했습니다.
          required: false
