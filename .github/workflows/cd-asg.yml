name: CD [ASG]

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "docker/**"
      - "infra/asg/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd-asg.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        options:
          - Development
          - Production

concurrency:
  group: cd-asg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-and-build:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
      packages: write
      statuses: write
      deployments: write
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}

  deploy:
    needs: ci-and-build
    if: needs.ci-and-build.outputs.environment != 'Test'
    runs-on: ubuntu-latest
    environment: ${{ needs.ci-and-build.outputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.ci-and-build.outputs.environment }}
      IMAGE_TAG: ${{ needs.ci-and-build.outputs.image_tag }}

      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'umc-product-server' }}

      ASG_NAME: ${{ vars.ASG_NAME }}
      LAUNCH_TEMPLATE_NAME: ${{ vars.LAUNCH_TEMPLATE_NAME }}
      APP_PORT: ${{ vars.APP_PORT || '8080' }}
      MANAGEMENT_PORT: ${{ vars.MANAGEMENT_PORT || '9090' }}
      SECRET_S3_URI: ${{ vars.SECRET_S3_URI }}
      MIN_HEALTHY_PERCENTAGE: ${{ vars.ASG_MIN_HEALTHY_PERCENTAGE || '100' }}
      MAX_HEALTHY_PERCENTAGE: ${{ vars.ASG_MAX_HEALTHY_PERCENTAGE || '200' }}
      INSTANCE_WARMUP: ${{ vars.ASG_INSTANCE_WARMUP || '300' }}

    steps:
      - name: 📦 코드베이스 체크아웃
        uses: actions/checkout@v4

      - name: 🔑 AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🧾 배포 변수 확인
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 ASG 배포 시작: ${ENVIRONMENT}"
          echo "📦 Image Tag: ${IMAGE_TAG}"
          echo "🏗️ ASG: ${ASG_NAME}"
          echo "🚀 Launch Template: ${LAUNCH_TEMPLATE_NAME}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 🧩 Launch Template 새 버전 생성
        id: lt
        run: |
          set -euo pipefail

          : "${AWS_REGION:?AWS_REGION is required}"
          : "${ASG_NAME:?ASG_NAME is required}"
          : "${LAUNCH_TEMPLATE_NAME:?LAUNCH_TEMPLATE_NAME is required}"
          : "${ECR_REPOSITORY:?ECR_REPOSITORY is required}"
          : "${APP_PORT:?APP_PORT is required}"
          : "${MANAGEMENT_PORT:?MANAGEMENT_PORT is required}"
          : "${SECRET_S3_URI:?SECRET_S3_URI is required}"

          if [[ -z "${AWS_ACCOUNT_ID}" ]]; then
            AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          fi

          case "${ENVIRONMENT}" in
            Production) SPRING_PROFILE="prod" ;;
            Development) SPRING_PROFILE="dev" ;;
            Test) SPRING_PROFILE="test" ;;
            *) SPRING_PROFILE="dev" ;;
          esac

          cp infra/asg/user-data.sh /tmp/user-data.sh

          sed -i "s|__AWS_REGION__|${AWS_REGION}|g" /tmp/user-data.sh
          sed -i "s|__AWS_ACCOUNT_ID__|${AWS_ACCOUNT_ID}|g" /tmp/user-data.sh
          sed -i "s|__ECR_REPOSITORY__|${ECR_REPOSITORY}|g" /tmp/user-data.sh
          sed -i "s|__IMAGE_TAG__|${IMAGE_TAG}|g" /tmp/user-data.sh
          sed -i "s|__APP_PORT__|${APP_PORT}|g" /tmp/user-data.sh
          sed -i "s|__MANAGEMENT_PORT__|${MANAGEMENT_PORT}|g" /tmp/user-data.sh
          sed -i "s|__SECRET_S3_URI__|${SECRET_S3_URI}|g" /tmp/user-data.sh
          sed -i "s|__SPRING_PROFILE__|${SPRING_PROFILE}|g" /tmp/user-data.sh

          USER_DATA_BASE64=$(base64 -w 0 /tmp/user-data.sh)

          cat > /tmp/launch-template-user-data.json <<EOF
          {
            "UserData": "${USER_DATA_BASE64}"
          }
          EOF

          NEW_LT_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-name "${LAUNCH_TEMPLATE_NAME}" \
            --source-version '$Latest' \
            --launch-template-data file:///tmp/launch-template-user-data.json \
            --region "${AWS_REGION}" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          echo "new_lt_version=${NEW_LT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Created Launch Template version: ${NEW_LT_VERSION}"

      - name: 🚀 ASG Instance Refresh 시작
        id: refresh
        run: |
          set -euo pipefail

          for value_name in MIN_HEALTHY_PERCENTAGE MAX_HEALTHY_PERCENTAGE INSTANCE_WARMUP; do
            value="${!value_name}"
            if ! [[ "${value}" =~ ^[0-9]+$ ]]; then
              echo "::error::${value_name} must be numeric. current=${value}"
              exit 1
            fi
          done

          if (( MIN_HEALTHY_PERCENTAGE < 0 || MIN_HEALTHY_PERCENTAGE > 100 )); then
            echo "::error::MIN_HEALTHY_PERCENTAGE must be between 0 and 100."
            exit 1
          fi

          if (( MAX_HEALTHY_PERCENTAGE < 100 || MAX_HEALTHY_PERCENTAGE > 200 )); then
            echo "::error::MAX_HEALTHY_PERCENTAGE must be between 100 and 200."
            exit 1
          fi

          if (( MIN_HEALTHY_PERCENTAGE > MAX_HEALTHY_PERCENTAGE )); then
            echo "::error::MIN_HEALTHY_PERCENTAGE must be less than or equal to MAX_HEALTHY_PERCENTAGE."
            exit 1
          fi

          cat > /tmp/instance-refresh.json <<EOF
          {
            "AutoScalingGroupName": "${ASG_NAME}",
            "DesiredConfiguration": {
              "LaunchTemplate": {
                "LaunchTemplateName": "${LAUNCH_TEMPLATE_NAME}",
                "Version": "${{ steps.lt.outputs.new_lt_version }}"
              }
            },
            "Preferences": {
              "MinHealthyPercentage": ${MIN_HEALTHY_PERCENTAGE},
              "MaxHealthyPercentage": ${MAX_HEALTHY_PERCENTAGE},
              "InstanceWarmup": ${INSTANCE_WARMUP},
              "SkipMatching": true,
              "AutoRollback": true
            }
          }
          EOF

          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --cli-input-json file:///tmp/instance-refresh.json \
            --region "${AWS_REGION}" \
            --query 'InstanceRefreshId' \
            --output text)

          echo "refresh_id=${REFRESH_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ Started Instance Refresh: ${REFRESH_ID}"

      - name: ⏳ ASG Instance Refresh 완료 대기
        run: |
          set -euo pipefail

          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${ASG_NAME}" \
              --instance-refresh-ids "${{ steps.refresh.outputs.refresh_id }}" \
              --region "${AWS_REGION}" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            PERCENTAGE=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${ASG_NAME}" \
              --instance-refresh-ids "${{ steps.refresh.outputs.refresh_id }}" \
              --region "${AWS_REGION}" \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text)

            REASON=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${ASG_NAME}" \
              --instance-refresh-ids "${{ steps.refresh.outputs.refresh_id }}" \
              --region "${AWS_REGION}" \
              --query 'InstanceRefreshes[0].StatusReason' \
              --output text)

            echo "Status=${STATUS}, Percentage=${PERCENTAGE}%, Reason=${REASON}"

            case "${STATUS}" in
              Successful)
                echo "✅ Instance Refresh completed"
                exit 0
                ;;
              RollbackSuccessful)
                echo "::error::Instance Refresh rolled back. Reason=${REASON}"
                exit 1
                ;;
              Failed|Cancelled|RollbackFailed)
                echo "::error::Instance Refresh failed. Status=${STATUS}, Reason=${REASON}"
                exit 1
                ;;
            esac

            sleep 15
          done

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "### 🚀 ASG Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Environment | \`${{ env.ENVIRONMENT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Image Tag | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ ASG | \`${{ env.ASG_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Launch Template | \`${{ env.LAUNCH_TEMPLATE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧩 Launch Template Version | \`${{ steps.lt.outputs.new_lt_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: ❌ 배포 실패 알림
        if: failure()
        run: |
          echo "::error::ASG deployment to ${{ env.ENVIRONMENT }} failed!"
          echo "EC2 /var/log/umc-product-user-data.log, /var/log/cloud-init-output.log, ASG Instance Refresh 상태를 확인해주세요."

  skip-test-deployment:
    needs: ci-and-build
    if: needs.ci-and-build.outputs.environment == 'Test'
    runs-on: ubuntu-latest
    steps:
      - name: ℹ️ Test 환경 배포 스킵
        run: echo "Test 환경은 CI만 실행합니다."
