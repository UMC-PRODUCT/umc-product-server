# Required repository variables:
# - vars.UMC_GITHUB_APP_CLIENT_ID (used by reusable CI feedback)
# - vars.SECRET_S3_URI
# Optional repository variables:
# - vars.AWS_REGION (default: ap-northeast-2)
# - vars.ECR_REPOSITORY (default: umc-product-server)
# - vars.HTTP_PORT (default: 8080)
# - vars.APP_PORT (default: 8080)
# - vars.MANAGEMENT_PORT (default: 9090)
# - vars.APP_REPLICAS (default: 1)
# - vars.HEALTHCHECK_TIMEOUT (default: 180)
# Required repository secrets:
# - secrets.UMC_GITHUB_APP_PRIVATE_KEY (used by reusable CI feedback)
# - secrets.AWS_ACCESS_KEY_ID
# - secrets.AWS_SECRET_ACCESS_KEY
# - secrets.SERVER_APP_DIRECTORY
# - secrets.SERVER_SSH_HOST
# - secrets.SERVER_SSH_USERNAME
# - secrets.SERVER_SSH_PRIVATE_KEY
# - secrets.SERVER_SSH_PORT
# - secrets.DISCORD_CD_WEBHOOK_URL
# Optional repository secrets:
# - secrets.AWS_ACCOUNT_ID (inferred from AWS STS when empty)

name: CD [Develop Home Server]

on:
  push:
    branches:
      - develop
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "docker/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd-dev-home.yml"
      - ".github/scripts/**"
  workflow_dispatch:

concurrency:
  group: cd-dev-home-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-and-build:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
      packages: write
      statuses: write
      deployments: write
    secrets: inherit
    with:
      environment: Development

  deploy:
    name: Deploy to Develop Home Server
    needs: ci-and-build
    if: (github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch') && needs.ci-and-build.outputs.environment == 'Development'
    runs-on: ubuntu-latest
    environment: Development

    env:
      ENVIRONMENT: ${{ needs.ci-and-build.outputs.environment }}
      IMAGE_TAG: ${{ needs.ci-and-build.outputs.image_tag }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'umc-product-server' }}
      HTTP_PORT: ${{ vars.HTTP_PORT || '8080' }}
      APP_PORT: ${{ vars.APP_PORT || '8080' }}
      MANAGEMENT_PORT: ${{ vars.MANAGEMENT_PORT || '9090' }}
      SECRET_S3_URI: ${{ vars.SECRET_S3_URI }}
      APP_REPLICAS: ${{ vars.APP_REPLICAS || '1' }}
      HEALTHCHECK_TIMEOUT: ${{ vars.HEALTHCHECK_TIMEOUT || '180' }}

    steps:
      - name: 코드베이스 체크아웃
        uses: actions/checkout@v4

      - name: 환경변수 검증
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVER_APP_DIRECTORY: ${{ secrets.SERVER_APP_DIRECTORY }}
          SERVER_SSH_HOST: ${{ secrets.SERVER_SSH_HOST }}
          SERVER_SSH_USERNAME: ${{ secrets.SERVER_SSH_USERNAME }}
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: bash .github/scripts/cd-dev-home-validate-env.sh

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 및 S3 secret 준비
        run: bash .github/scripts/cd-dev-home-prepare-env.sh

      - name: 배포 정보 출력
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Develop 홈서버 배포 정보"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Environment: ${ENVIRONMENT}"
          echo "Image: ${ECR_IMAGE_NAME}:${IMAGE_TAG}"
          echo "App Replicas: ${APP_REPLICAS}"
          echo "HTTP Port: ${HTTP_PORT}"
          echo "App Port: ${APP_PORT}"
          echo "Management Port: ${MANAGEMENT_PORT}"
          echo "App Directory: ${{ secrets.SERVER_APP_DIRECTORY }}"
          echo "Server: ${{ secrets.SERVER_SSH_HOST }}"
          echo "User: ${{ secrets.SERVER_SSH_USERNAME }}"
          echo "Port: ${{ secrets.SERVER_SSH_PORT }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 기존 Docker Compose 파일 삭제
        uses: appleboy/ssh-action@v1
        env:
          SERVER_APP_DIRECTORY: ${{ secrets.SERVER_APP_DIRECTORY }}
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: SERVER_APP_DIRECTORY
          script_path: .github/scripts/cd-dev-home-cleanup-remote.sh

      - name: Docker Compose 파일 전송
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "docker/develop/docker-compose.yml,docker/develop/nginx.conf"
          target: "${{ secrets.SERVER_APP_DIRECTORY }}/"
          strip_components: 2
          overwrite: false

      - name: SSH 접속 및 develop 배포 실행
        uses: appleboy/ssh-action@v1
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          SERVER_APP_DIRECTORY: ${{ secrets.SERVER_APP_DIRECTORY }}
          APP_REPLICAS: ${{ env.APP_REPLICAS }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
          APP_PORT: ${{ env.APP_PORT }}
          MANAGEMENT_PORT: ${{ env.MANAGEMENT_PORT }}
          HEALTHCHECK_TIMEOUT: ${{ env.HEALTHCHECK_TIMEOUT }}
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: ENVIRONMENT,IMAGE_TAG,ECR_REGISTRY,ECR_IMAGE_NAME,ECR_PASSWORD,SERVER_APP_DIRECTORY,APP_ENV_B64,APP_REPLICAS,HTTP_PORT,APP_PORT,MANAGEMENT_PORT,HEALTHCHECK_TIMEOUT
          script_path: .github/scripts/cd-dev-home-deploy.sh

      - name: Deployment Summary
        if: always()
        run: |
          {
            echo "### Develop Home Server Deployment Summary"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| Environment | \`${{ env.ENVIRONMENT }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Image | \`${ECR_IMAGE_NAME}:${{ env.IMAGE_TAG }}\` |"
            echo "| HTTP Port | \`${{ env.HTTP_PORT }}\` |"
            echo "| App Port | \`${{ env.APP_PORT }}\` |"
            echo "| Management Port | \`${{ env.MANAGEMENT_PORT }}\` |"
            echo "| Server | \`${{ secrets.SERVER_SSH_HOST }}\` |"
            echo "| Directory | \`${{ secrets.SERVER_APP_DIRECTORY }}\` |"
            echo "| Status | \`${{ job.status }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 배포 실패 알림
        if: failure()
        run: |
          echo "::error::Develop home server deployment failed."
          echo "GitHub Actions 로그와 홈서버 Docker 로그를 확인해주세요."

      - name: Discord 배포 결과 알림
        if: always()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CD_WEBHOOK_URL }}
          DEPLOY_WORKFLOW: ${{ github.workflow }}
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_ENVIRONMENT: ${{ env.ENVIRONMENT }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_TARGET: Develop Home Server
          DEPLOY_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .github/scripts/discord-deploy-notify.mjs
