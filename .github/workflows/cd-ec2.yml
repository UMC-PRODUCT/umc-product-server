name: CD [EC2]

on:
  push:
    branches:
      - develop
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "docker/**"
      - "codedeploy/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/cd-ec2.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options:
          - Development

concurrency:
  group: cd-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-and-build:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
      packages: write
      statuses: write
      deployments: write
    secrets: inherit
    with:
      environment: ${{ inputs.environment || 'Development' }}

  deploy:
    name: Deploy to EC2
    needs: ci-and-build
    runs-on: ubuntu-latest
    environment: ${{ needs.ci-and-build.outputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.ci-and-build.outputs.environment }}
      IMAGE_TAG: ${{ needs.ci-and-build.outputs.image_tag }}
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: umc-product-server
      S3_APP_ENV_URI: ${{ secrets.AWS_S3_APP_ENV_URI }}
      SERVER_APP_DIRECTORY: ${{ secrets.SERVER_APP_DIRECTORY }}
      APP_REPLICAS: ${{ vars.DEV_APP_REPLICAS || '1' }}
      CODEDEPLOY_APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
      CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}

    steps:
      - name: 코드베이스 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 주소 계산 및 배포 번들 준비
        run: |
          set -euo pipefail

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_IMAGE_NAME="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          S3_BUCKET="$(echo "${S3_APP_ENV_URI}" | sed 's|s3://\([^/]*\)/.*|\1|')"

          {
            echo "ECR_REGISTRY=${ECR_REGISTRY}"
            echo "ECR_IMAGE_NAME=${ECR_IMAGE_NAME}"
            echo "S3_BUCKET=${S3_BUCKET}"
          } >> "$GITHUB_ENV"

          # EC2 배포 스크립트에서 사용할 환경변수 파일 생성
          # DB 자격증명은 포함하지 않음 — EC2에서 S3의 app.env를 통해 직접 조회
          cat > .env.deploy << EOF
          ECR_REGISTRY=${ECR_REGISTRY}
          ECR_IMAGE_NAME=${ECR_IMAGE_NAME}
          IMAGE_TAG=${IMAGE_TAG}
          APP_REPLICAS=${APP_REPLICAS}
          AWS_DEFAULT_REGION=${AWS_REGION}
          S3_APP_ENV_URI=${S3_APP_ENV_URI}
          SERVER_APP_DIRECTORY=${SERVER_APP_DIRECTORY}
          EOF

      - name: 배포 번들 생성 및 S3 업로드
        run: |
          set -euo pipefail

          # CodeDeploy 번들 구조: appspec.yml은 루트, 스크립트는 scripts/ 하위
          mkdir -p /tmp/bundle/scripts /tmp/bundle/docker/develop
          cp codedeploy/appspec.yml   /tmp/bundle/appspec.yml
          cp codedeploy/app_stop.sh   /tmp/bundle/scripts/app_stop.sh
          cp codedeploy/app_start.sh  /tmp/bundle/scripts/app_start.sh
          cp docker/develop/docker-compose.yml /tmp/bundle/docker/develop/docker-compose.yml
          cp docker/develop/nginx.conf         /tmp/bundle/docker/develop/nginx.conf
          cp .env.deploy              /tmp/bundle/.env.deploy

          cd /tmp/bundle && zip -r /tmp/deploy-bundle.zip .
          cp /tmp/deploy-bundle.zip "${GITHUB_WORKSPACE}/deploy-bundle.zip"

          S3_BUNDLE_KEY="codedeploy/bundles/${IMAGE_TAG}.zip"
          aws s3 cp deploy-bundle.zip "s3://${S3_BUCKET}/${S3_BUNDLE_KEY}"

          echo "S3_BUNDLE_KEY=${S3_BUNDLE_KEY}" >> "$GITHUB_ENV"

      - name: 배포 정보 출력
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Environment : ${ENVIRONMENT}"
          echo "Image       : ${ECR_IMAGE_NAME}:${IMAGE_TAG}"
          echo "Bundle      : s3://${S3_BUCKET}/${S3_BUNDLE_KEY}"
          echo "App         : ${CODEDEPLOY_APP_NAME} / ${CODEDEPLOY_DEPLOYMENT_GROUP}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: CodeDeploy 배포 생성
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --s3-location "bucket=${S3_BUCKET},key=${S3_BUNDLE_KEY},bundleType=zip" \
            --description "Deploy ${IMAGE_TAG} to ${ENVIRONMENT}" \
            --query 'deploymentId' \
            --output text)

          echo "Deployment ID: ${DEPLOYMENT_ID}"
          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"

      - name: 배포 완료 대기
        run: |
          aws deploy wait deployment-successful \
            --deployment-id "${DEPLOYMENT_ID}"

      - name: Deployment Summary
        if: always()
        run: |
          {
            echo "### EC2 Deployment Summary"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| Environment | \`${ENVIRONMENT}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Image | \`${ECR_IMAGE_NAME}:${IMAGE_TAG}\` |"
            echo "| Deployment ID | \`${DEPLOYMENT_ID}\` |"
            echo "| Status | \`${{ job.status }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 배포 실패 시 상세 정보 출력
        if: failure()
        run: |
          aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.{Status:status,Error:errorInformation}' \
            --output json || true
