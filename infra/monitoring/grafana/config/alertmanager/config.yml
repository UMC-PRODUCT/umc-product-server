# Alertmanager — 자체 호스팅 알람 라우팅 (ADR-014 Phase 1)
#
# Prometheus / Loki 의 alerting rule 이 발화하면 본 alertmanager 가 라우팅을 담당한다.
# 디폴트 라우트는 Discord webhook 으로 전송 — application 코드의 webhook URL
# (app.webhook.discord) 과 분리되어 인프라 알람 전용으로 사용한다.
# 모든 알림은 environment 라벨로 개발/운영 채널을 분기한다. Loki 로그 알림은
# 집계 중 environment 라벨이 사라질 수 있어 alert_source 와 service_name으로 보완한다.
#
# 운영 주의:
# - DISCORD_ALERT_WEBHOOK, DISCORD_DEV_ALERT_WEBHOOK,
#   DISCORD_PROD_ALERT_WEBHOOK 가 비어 있으면 docker-compose.yml 의 config content 가 로컬
#   dummy URL 파일을 주입해 Alertmanager 기동만 성공하게 한다. 운영 배포 전에는 반드시
#   실제 webhook 으로 교체할 것.
# - Phase 2 에서 PagerDuty / 별도 채널 라우팅이 필요해지면 routes 트리 확장.

global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: [ alertname, severity, environment, service_name, application, job, instance ]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Loki 집계 결과에는 environment 라벨이 남지 않을 수 있으므로 service_name 으로도 차단한다.
    - receiver: drop-local
      matchers:
        - alert_source="loki"
        - service_name=~"local-.*"
      continue: false

    # Prometheus를 포함해 environment 라벨을 보유한 모든 알림을 환경별로 라우팅한다.
    - receiver: drop-local
      matchers:
        - environment="local"
      continue: false

    - receiver: discord-dev
      matchers:
        - environment="dev"
      continue: false

    - receiver: discord-prod
      matchers:
        - environment="prod"
      continue: false

    # Loki 로그 알림은 environment 라벨이 없는 경우 service_name으로 환경을 판별한다.
    - receiver: discord-dev
      matchers:
        - alert_source="loki"
        - service_name=~"dev-.*"
      continue: false

    - receiver: discord-prod
      matchers:
        - alert_source="loki"
        - service_name=~"prod-.*"
      continue: false

receivers:
  - name: drop-local
  - name: discord
    discord_configs:
      - send_resolved: true
        webhook_url_file: /etc/alertmanager/secrets/discord-webhook
        title: '{{ $scope := or (index .CommonLabels "environment") (index .CommonLabels "deployment_environment") (index .CommonLabels "service_name") (index .CommonLabels "application") (index .CommonLabels "job") (index .CommonLabels "instance") "unknown" }}[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}][{{ $scope }}] {{ .CommonLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          {{ $scope := or (index .Labels "environment") (index .Labels "deployment_environment") (index .Labels "service_name") (index .Labels "application") (index .Labels "job") "unknown" }}
          {{ $target := or (index .Labels "instance") (index .Labels "pod") (index .Labels "name") "-" }}
          • {{ .Annotations.summary }}
            환경: {{ $scope }}
            severity: {{ .Labels.severity }}
            대상: {{ $target }}{{ if index .Labels "pool" }}
            pool: {{ index .Labels "pool" }}{{ end }}{{ if index .Labels "uri" }}
            route: {{ index .Labels "method" }} {{ index .Labels "uri" }}{{ end }}{{ if .Annotations.description }}
            설명: {{ .Annotations.description }}{{ end }}
          {{ end }}
  - name: discord-dev
    discord_configs:
      - send_resolved: true
        webhook_url_file: /etc/alertmanager/secrets/discord-dev-webhook
        title: '{{ $scope := or (index .CommonLabels "environment") (index .CommonLabels "deployment_environment") (index .CommonLabels "service_name") (index .CommonLabels "application") (index .CommonLabels "job") (index .CommonLabels "instance") "unknown" }}[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}][{{ $scope }}] {{ .CommonLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          {{ $scope := or (index .Labels "environment") (index .Labels "deployment_environment") (index .Labels "service_name") (index .Labels "application") (index .Labels "job") "unknown" }}
          {{ $target := or (index .Labels "instance") (index .Labels "pod") (index .Labels "name") "-" }}
          • {{ .Annotations.summary }}
            환경: {{ $scope }}
            severity: {{ .Labels.severity }}
            대상: {{ $target }}{{ if index .Labels "pool" }}
            pool: {{ index .Labels "pool" }}{{ end }}{{ if index .Labels "uri" }}
            route: {{ index .Labels "method" }} {{ index .Labels "uri" }}{{ end }}{{ if .Annotations.description }}
            설명: {{ .Annotations.description }}{{ end }}
          {{ end }}
  - name: discord-prod
    discord_configs:
      - send_resolved: true
        webhook_url_file: /etc/alertmanager/secrets/discord-prod-webhook
        title: '{{ $scope := or (index .CommonLabels "environment") (index .CommonLabels "deployment_environment") (index .CommonLabels "service_name") (index .CommonLabels "application") (index .CommonLabels "job") (index .CommonLabels "instance") "unknown" }}[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}][{{ $scope }}] {{ .CommonLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          {{ $scope := or (index .Labels "environment") (index .Labels "deployment_environment") (index .Labels "service_name") (index .Labels "application") (index .Labels "job") "unknown" }}
          {{ $target := or (index .Labels "instance") (index .Labels "pod") (index .Labels "name") "-" }}
          • {{ .Annotations.summary }}
            환경: {{ $scope }}
            severity: {{ .Labels.severity }}
            대상: {{ $target }}{{ if index .Labels "pool" }}
            pool: {{ index .Labels "pool" }}{{ end }}{{ if index .Labels "uri" }}
            route: {{ index .Labels "method" }} {{ index .Labels "uri" }}{{ end }}{{ if .Annotations.description }}
            설명: {{ .Annotations.description }}{{ end }}
          {{ end }}

inhibit_rules:
  # 동일 alertname 의 critical 발화 중에는 warning 알람을 중복 전송하지 않는다.
  - source_matchers: [ 'severity="critical"' ]
    target_matchers: [ 'severity="warning"' ]
    equal: [ 'alertname', 'environment', 'service_name', 'application', 'job', 'instance' ]
