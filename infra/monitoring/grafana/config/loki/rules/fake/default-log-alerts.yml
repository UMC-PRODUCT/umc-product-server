groups:
  - name: umc-product.logs
    rules:
      - alert: ErrorLogsSpike
        expr: sum by (service_name) (count_over_time({service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"} |= "ERROR" [5m])) > 10
        for: 3m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "ERROR log 증가를 확인해주세요"
          description: "service={{ $labels.service_name }} 에서 최근 5분 동안 ERROR log가 10건을 넘었어요. 최근 배포와 error stack trace를 확인해주세요."

      - alert: StructuredErrorLogsSpike
        expr: sum by (service_name) (count_over_time({service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"} | json | level="ERROR" [5m])) > 10
        for: 3m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "Structured ERROR log 증가를 확인해주세요"
          description: "service={{ $labels.service_name }} 에서 최근 5분 동안 structured ERROR log가 10건을 넘었어요. event, traceId, stack trace를 확인해주세요."

      - alert: EmailDomainExceptionSpike
        expr: sum by (service_name) (count_over_time({service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"} |= "EmailDomainException" [5m])) > 3
        for: 3m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "EmailDomainException 증가를 확인해주세요"
          description: "service={{ $labels.service_name }} 에서 최근 5분 동안 EmailDomainException이 3건을 넘었어요. 이메일 domain 검증 로직과 입력값을 확인해주세요."

      - alert: NullPointerExceptionDetected
        expr: sum by (service_name) (count_over_time({service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"} |= "NullPointerException" [5m])) > 0
        for: 0m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "NullPointerException log를 확인해주세요"
          description: "service={{ $labels.service_name }} 의 API log에 NullPointerException이 나타났어요. stack trace와 최근 변경을 확인해주세요."

      - alert: StructuredLoginFailuresSpike
        expr: sum by (service_name) (count_over_time({service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"} | json | event="auth_login_failed" [5m])) > 5
        for: 3m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "Structured login failure 증가를 확인해주세요"
          description: "service={{ $labels.service_name }} 에서 최근 5분 동안 auth_login_failed event가 5건을 넘었어요. 실패 사유와 인증 설정을 확인해주세요."

      - alert: EmailSendFailures
        expr: |
          sum by (service_name) (
            count_over_time(
              {service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"}
              |~ "email|Email|mail|Mail"
              |~ "fail|failed|exception|Exception|error|ERROR"
              [5m]
            )
          ) > 3
        for: 0m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "Email send failure log를 확인해주세요"
          description: "service={{ $labels.service_name }} 에서 최근 5분 동안 email 관련 failure log가 3건을 넘었어요. SMTP/API provider 상태와 재시도 log를 확인해주세요."

      - alert: StructuredEmailSendFailures
        expr: sum by (service_name) (count_over_time({service_name=~"(local|dev|prod)-umc-product|umc-product-api|x-umc-product"} | json | event="email_send_failed" [5m])) > 0
        for: 0m
        labels:
          severity: warning
          alert_source: loki
        annotations:
          summary: "Structured email send failure를 확인해주세요"
          description: "service={{ $labels.service_name }} 의 API log에 email_send_failed event가 나타났어요. provider response와 재시도 log를 확인해주세요."
