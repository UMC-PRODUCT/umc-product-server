groups:
  - name: umc-product.dashboard-services
    rules:
      - record: umc_product_service_fallback_info
        expr: vector(1)
        labels:
          application: local-umc-product
          service_name: local-umc-product

      - record: umc_product_service_fallback_info
        expr: vector(1)
        labels:
          application: dev-umc-product
          service_name: dev-umc-product

      - record: umc_product_service_fallback_info
        expr: vector(1)
        labels:
          application: prod-umc-product
          service_name: prod-umc-product

  - name: umc-product.availability
    rules:
      - alert: ApiServerDown
        expr: up{job=~".*umc.*|.*api.*|.*server.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API server target м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "Prometheusк°Җ job={{ $labels.job }}, instance={{ $labels.instance }} лҘј scrapeн•ҳм§Җ лӘ»н•ҳкі  мһҲм–ҙмҡ”. target мғҒнғңмҷҖ л„ӨнҠёмӣҢнҒ¬лҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      # - alert: NodeExporterDown
      #   expr: up{job="node-exporter"} == 0
      #   for: 3m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "Node exporter is down"
      #     description: "Host metrics are not being scraped from {{ $labels.instance }}."

      - alert: PrometheusTargetDown
        expr: up{job!="node-exporter"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "job={{ $labels.job }}, instance={{ $labels.instance }} targetмқ„ 3л¶„ мқҙмғҒ scrapeн•ҳм§Җ лӘ»н–Ҳм–ҙмҡ”. exporterмҷҖ л„ӨнҠёмӣҢнҒ¬ мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: PostgreSQLDown
        expr: up{job=~".*postgres.*"} == 0 or pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "PostgreSQL exporterк°Җ database unavailable мғҒнғңлҘј ліҙлғҲм–ҙмҡ”. job={{ $labels.job }}, instance={{ $labels.instance }} мқҳ DBмҷҖ exporterлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: RedisDown
        expr: up{job=~".*redis.*|.*valkey.*"} == 0 or redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis/Valkey м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "Redis/Valkey exporterк°Җ cache unavailable мғҒнғңлҘј ліҙлғҲм–ҙмҡ”. job={{ $labels.job }}, instance={{ $labels.instance }} мқҳ cacheмҷҖ exporterлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: OTelCollectorDown
        expr: up{job=~".*otel.*|.*collector.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OTel Collector мҲҳмӢ  мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "OTel CollectorлҘј нҶөн•ң telemetry ingestionмқҙ л©Ҳм·„м–ҙмҡ”. job={{ $labels.job }}, instance={{ $labels.instance }} мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: LokiDown
        expr: up{job=~".*loki.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Loki м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "Prometheusк°Җ LokiлҘј scrapeн•ҳм§Җ лӘ»н•ҳкі  мһҲм–ҙмҡ”. instance={{ $labels.instance }} мқҳ Loki мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus self-scrapeлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "Prometheusк°Җ мһҗкё° мһҗмӢ мқ„ scrapeн•ҳм§Җ лӘ»н•ҳкі  мһҲм–ҙмҡ”. instance={{ $labels.instance }} мқҳ Prometheus мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "Alert deliveryк°Җ м§Җм—°лҗ  мҲҳ мһҲм–ҙмҡ”. instance={{ $labels.instance }} мқҳ Alertmanager мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Grafana м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "Prometheusк°Җ GrafanaлҘј scrapeн•ҳм§Җ лӘ»н•ҳкі  мһҲм–ҙмҡ”. instance={{ $labels.instance }} мқҳ Grafana мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

  - name: umc-product.host
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance, job, os) (rate(node_cpu_seconds_total{job="node-exporter", os="linux", mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usageк°Җ 80%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }} мқҳ CPU usageк°Җ 10л¶„ мқҙмғҒ 80%лҘј л„ҳм—Ҳм–ҙмҡ”. лҶ’мқҖ processмҷҖ мөңк·ј л°°нҸ¬лҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: HighCpuUsage
        expr: 100 - (avg by (instance, job, os) (rate(node_cpu_seconds_total{job="node-exporter", os="linux", mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "CPU usageк°Җ 90%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }} мқҳ CPU usageк°Җ 10л¶„ мқҙмғҒ 90%лҘј л„ҳм—Ҳм–ҙмҡ”. лҶ’мқҖ processмҷҖ мөңк·ј л°°нҸ¬лҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter", os="linux"} / node_memory_MemTotal_bytes{job="node-exporter", os="linux"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory usageк°Җ 85%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }} мқҳ memory usageк°Җ 10л¶„ мқҙмғҒ 85%лҘј л„ҳм—Ҳм–ҙмҡ”. memory мҰқк°Җ мӣҗмқёкіј OOM logлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter", os="linux"} / node_memory_MemTotal_bytes{job="node-exporter", os="linux"})) * 100 > 95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Memory usageк°Җ 95%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }} мқҳ memory usageк°Җ 10л¶„ мқҙмғҒ 95%лҘј л„ҳм—Ҳм–ҙмҡ”. memory мҰқк°Җ мӣҗмқёкіј OOM logлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: HighDiskUsage
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{job="node-exporter", os="linux", device_error="", fstype!~"tmpfs|overlay|squashfs|devtmpfs|proc|sysfs|cgroup2?|pstore|tracefs|debugfs|securityfs|configfs|nsfs|autofs|fuse\\..*|ramfs|binfmt_misc|rpc_pipefs", mountpoint!~"^/(dev|proc|sys|run|var/lib/docker|var/lib/containers|var/lib/kubelet|snap)($|/)"}
              /
              node_filesystem_size_bytes{job="node-exporter", os="linux", device_error="", fstype!~"tmpfs|overlay|squashfs|devtmpfs|proc|sysfs|cgroup2?|pstore|tracefs|debugfs|securityfs|configfs|nsfs|autofs|fuse\\..*|ramfs|binfmt_misc|rpc_pipefs", mountpoint!~"^/(dev|proc|sys|run|var/lib/docker|var/lib/containers|var/lib/kubelet|snap)($|/)"}
            )
          ) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usageк°Җ 80%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }}, mountpoint={{ $labels.mountpoint }} мқҳ disk usageк°Җ 10л¶„ мқҙмғҒ 80%лҘј л„ҳм—Ҳм–ҙмҡ”. log, chunk, volume мӮ¬мҡ©лҹүмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: HighDiskUsage
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{job="node-exporter", os="linux", device_error="", fstype!~"tmpfs|overlay|squashfs|devtmpfs|proc|sysfs|cgroup2?|pstore|tracefs|debugfs|securityfs|configfs|nsfs|autofs|fuse\\..*|ramfs|binfmt_misc|rpc_pipefs", mountpoint!~"^/(dev|proc|sys|run|var/lib/docker|var/lib/containers|var/lib/kubelet|snap)($|/)"}
              /
              node_filesystem_size_bytes{job="node-exporter", os="linux", device_error="", fstype!~"tmpfs|overlay|squashfs|devtmpfs|proc|sysfs|cgroup2?|pstore|tracefs|debugfs|securityfs|configfs|nsfs|autofs|fuse\\..*|ramfs|binfmt_misc|rpc_pipefs", mountpoint!~"^/(dev|proc|sys|run|var/lib/docker|var/lib/containers|var/lib/kubelet|snap)($|/)"}
            )
          ) * 100 > 90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk usageк°Җ 90%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }}, mountpoint={{ $labels.mountpoint }} мқҳ disk usageк°Җ 10л¶„ мқҙмғҒ 90%лҘј л„ҳм—Ҳм–ҙмҡ”. л¶Ҳн•„мҡ”н•ң нҢҢмқј м •лҰ¬мҷҖ volume мҰқм„Өмқ„ кІҖнҶ н•ҙмЈјм„ёмҡ”."

      - alert: LowDiskFreeSpace
        expr: |
          count by (instance, job, os) (
            (
              node_filesystem_avail_bytes{job="node-exporter", os="linux", device_error="", fstype!~"tmpfs|overlay|squashfs|devtmpfs|proc|sysfs|cgroup2?|pstore|tracefs|debugfs|securityfs|configfs|nsfs|autofs|fuse\\..*|ramfs|binfmt_misc|rpc_pipefs", mountpoint!~"^/(dev|proc|sys|run|var/lib/docker|var/lib/containers|var/lib/kubelet|snap)($|/)"} < 10 * 1024 * 1024 * 1024
            )
            and
            (
              node_filesystem_size_bytes{job="node-exporter", os="linux", device_error="", fstype!~"tmpfs|overlay|squashfs|devtmpfs|proc|sysfs|cgroup2?|pstore|tracefs|debugfs|securityfs|configfs|nsfs|autofs|fuse\\..*|ramfs|binfmt_misc|rpc_pipefs", mountpoint!~"^/(dev|proc|sys|run|var/lib/docker|var/lib/containers|var/lib/kubelet|snap)($|/)"} > 20 * 1024 * 1024 * 1024
            )
          ) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk free spaceк°Җ л¶ҖмЎұн•ң filesystemмқҙ мһҲм–ҙмҡ”"
          description: "instance={{ $labels.instance }} мқҳ кҙҖлҰ¬ лҢҖмғҒ filesystem {{ printf \"%.0f\" $value }}к°ңм—җм„ң disk free spaceк°Җ 10GB лҜёл§Ңмқҙм—җмҡ”. Grafana filesystem лҢҖмӢңліҙл“ңм—җм„ң mountpointлі„ м—¬мң  кіөк°„мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ContainerRestarted
        expr: changes(container_start_time_seconds{name!=""}[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container мһ¬мӢңмһ‘мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "container={{ $labels.name }} мқҙ мөңк·ј 10л¶„ м•Ҳм—җ мһ¬мӢңмһ‘лҗҗм–ҙмҡ”. instance={{ $labels.instance }} мқҳ container logмҷҖ restart reasonмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

  - name: umc-product.api
    rules:
      - alert: ApiHigh5xxErrorRatio
        expr: |
          (
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count{status=~"5.."}[5m]))
            /
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m]))
          ) > 0.05
          and
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx ratioк°Җ 5%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} м—җм„ң 5л¶„ мқҙмғҒ API request мӨ‘ 5xx л№„мңЁмқҙ 5%лҘј л„ҳм—Ҳм–ҙмҡ”. мөңк·ј л°°нҸ¬мҷҖ error logлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHigh5xxErrorCount
        expr: sum by (application, service_name) (increase(http_server_requests_milliseconds_count{status=~"5.."}[5m])) > 10
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx countк°Җ лҶ’м•„мҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} м—җм„ң мөңк·ј 5л¶„ лҸҷм•Ҳ server errorк°Җ 10кұҙмқ„ л„ҳм—Ҳм–ҙмҡ”. мЈјмҡ” routeмҷҖ error logлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiRouteHigh5xxErrorCount
        expr: sum by (application, service_name, method, uri) (increase(http_server_requests_milliseconds_count{status=~"5.."}[5m])) > 5
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "API route 5xx countлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, route={{ $labels.method }} {{ $labels.uri }} м—җм„ң мөңк·ј 5л¶„ лҸҷм•Ҳ server errorк°Җ 5кұҙмқ„ л„ҳм—Ҳм–ҙмҡ”. н•ҙлӢ№ routeмқҳ error logлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHigh4xxErrorRatio
        expr: |
          (
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count{status=~"4.."}[5m]))
            /
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m]))
          ) > 0.3
          and
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API 4xx ratioк°Җ 30%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} м—җм„ң 10л¶„ мқҙмғҒ API request мӨ‘ 4xx л№„мңЁмқҙ 30%лҘј л„ҳм—Ҳм–ҙмҡ”. client request ліҖнҷ”мҷҖ мқёмҰқ/мһ…л Ҙ мҳӨлҘҳлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHighP95LatencyMilliseconds
        expr: histogram_quantile(0.95, sum by (application, service_name, le) (rate(http_server_requests_milliseconds_bucket[5m]))) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latencyк°Җ 2мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} мқҳ millisecond metric кё°мӨҖ p95 API latencyк°Җ 5л¶„ мқҙмғҒ 2мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”. лҠҗлҰ° routeмҷҖ DB/API мҷёл¶Җ нҳём¶ңмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHighP95LatencySeconds
        expr: histogram_quantile(0.95, sum by (application, service_name, le) (rate(http_server_requests_seconds_bucket[5m]))) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latencyк°Җ 2мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} мқҳ second metric кё°мӨҖ p95 API latencyк°Җ 5л¶„ мқҙмғҒ 2мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”. лҠҗлҰ° routeмҷҖ DB/API мҷёл¶Җ нҳём¶ңмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHighP99LatencyMilliseconds
        expr: histogram_quantile(0.99, sum by (application, service_name, le) (rate(http_server_requests_milliseconds_bucket[5m]))) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latencyк°Җ 5мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} мқҳ millisecond metric кё°мӨҖ p99 API latencyк°Җ 5л¶„ мқҙмғҒ 5мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”. лҠҗлҰ° routeмҷҖ DB/API мҷёл¶Җ нҳём¶ңмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHighP99LatencySeconds
        expr: histogram_quantile(0.99, sum by (application, service_name, le) (rate(http_server_requests_seconds_bucket[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latencyк°Җ 5мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} мқҳ second metric кё°мӨҖ p99 API latencyк°Җ 5л¶„ мқҙмғҒ 5мҙҲлҘј л„ҳм—Ҳм–ҙмҡ”. лҠҗлҰ° routeмҷҖ DB/API мҷёл¶Җ нҳём¶ңмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiTrafficDropped
        expr: |
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m]))
          <
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m] offset 1h)) * 0.2
          and
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m] offset 1h)) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API trafficмқҙ кёүк°җн–Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} мқҳ нҳ„мһ¬ request rateк°Җ 1мӢңк°„ м „мқҳ 20% лҜёл§Ңмқҙм—җмҡ”. л°°нҸ¬, gateway, upstream routingмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: LoginTrafficSpike
        expr: sum by (application, service_name) (rate(http_server_requests_milliseconds_count{uri=~".*login.*"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Login API trafficмқҙ лҶ’м•„мҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} мқҳ login кҙҖл Ё API trafficмқҙ 5л¶„ мқҙмғҒ мҙҲлӢ№ 5 requestлҘј л„ҳм—Ҳм–ҙмҡ”. л№„м •мғҒ мһ¬мӢңлҸ„мҷҖ OAuth мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiRouteTrafficSpike
        expr: sum by (application, service_name, method, uri) (rate(http_server_requests_milliseconds_count[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API route trafficмқҙ лҶ’м•„мҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, route={{ $labels.method }} {{ $labels.uri }} trafficмқҙ 5л¶„ мқҙмғҒ мҙҲлӢ№ 10 requestлҘј л„ҳм—Ҳм–ҙмҡ”. нҳём¶ң мЈјмІҙмҷҖ мөңк·ј ліҖкІҪмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - record: umc_product:http_requests:top10_10m
        expr: topk(10, sum by (application, service_name, method, uri) (increase(http_server_requests_milliseconds_count[10m])))

      - record: umc_product:http_request_p95:top10_5m
        expr: topk(10, histogram_quantile(0.95, sum by (application, service_name, le, method, uri) (rate(http_server_requests_milliseconds_bucket[5m]))))

      - record: umc_product:http_request_p95_seconds:top10_5m
        expr: topk(10, histogram_quantile(0.95, sum by (application, service_name, le, method, uri) (rate(http_server_requests_seconds_bucket[5m]))))

  - name: umc-product.database-cache
    rules:
      - alert: DbConnectionPoolHighUsage
        expr: sum by (application, service_name, instance, pool) (hikaricp_connections_active) / sum by (application, service_name, instance, pool) (hikaricp_connections_max) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB connection pool usageк°Җ 80%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} мқҳ HikariCP active connection л№„мңЁмқҙ 5л¶„ мқҙмғҒ 80%лҘј л„ҳм—Ҳм–ҙмҡ”. лҠҗлҰ° queryмҷҖ connection лҲ„мҲҳлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: DbConnectionPoolHighUsage
        expr: sum by (application, service_name, instance, pool) (hikaricp_connections_active) / sum by (application, service_name, instance, pool) (hikaricp_connections_max) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool usageк°Җ 95%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} мқҳ HikariCP active connection л№„мңЁмқҙ 5л¶„ мқҙмғҒ 95%лҘј л„ҳм—Ҳм–ҙмҡ”. лҠҗлҰ° queryмҷҖ connection лҲ„мҲҳлҘј лЁјм Җ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: DbConnectionPending
        expr: sum by (application, service_name, instance, pool) (hikaricp_connections_pending) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "DB connection лҢҖкё°лҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} м—җм„ң HikariCP connectionмқ„ кё°лӢӨлҰ¬лҠ” requestк°Җ 3л¶„ мқҙмғҒ лӮЁм•„ мһҲм–ҙмҡ”. pool size, active query, DB мқ‘лӢө мӢңк°„мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: DbConnectionTimeout
        expr: sum by (application, service_name, instance, pool) (increase(hikaricp_connections_timeout_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DB connection timeoutмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} м—җм„ң мөңк·ј 5л¶„ м•Ҳм—җ HikariCP connection acquisition timeoutмқҙ мһҲм—Ҳм–ҙмҡ”. DB мғҒнғңмҷҖ connection pool нҸ¬нҷ” м—¬л¶ҖлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: RedisMemoryHighUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis/Valkey memory usageк°Җ 80%лҘј л„ҳм—Ҳм–ҙмҡ”"
          description: "instance={{ $labels.instance }} мқҳ Redis/Valkey memory usageк°Җ 10л¶„ мқҙмғҒ 80%лҘј л„ҳм—Ҳм–ҙмҡ”. key мҰқк°Җлҹүкіј eviction м •мұ…мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: RedisRejectedConnections
        expr: increase(redis_rejected_connections_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Redis rejected connectionмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "instance={{ $labels.instance }} мқҳ Redis/Valkeyм—җм„ң мөңк·ј 5л¶„ м•Ҳм—җ rejected connectionмқҙ мһҲм—Ҳм–ҙмҡ”. maxclientsмҷҖ client мһ¬мӢңлҸ„лҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

  - name: umc-product.observability
    rules:
      - alert: OTelCollectorLogExportFailures
        expr: rate(otelcol_exporter_send_failed_log_records[5m]) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector log exportлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "OTel Collectorк°Җ log record exportм—җ мӢӨнҢЁн•ҳкі  мһҲм–ҙмҡ”. exporter={{ $labels.exporter }}, instance={{ $labels.instance }} мқҳ downstream endpointмҷҖ мқёмҰқ м •ліҙлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: OTelCollectorMetricExportFailures
        expr: rate(otelcol_exporter_send_failed_metric_points[5m]) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector metric exportлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "OTel Collectorк°Җ metric point exportм—җ мӢӨнҢЁн•ҳкі  мһҲм–ҙмҡ”. exporter={{ $labels.exporter }}, instance={{ $labels.instance }} мқҳ downstream endpointмҷҖ мқёмҰқ м •ліҙлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: OTelCollectorTraceExportFailures
        expr: rate(otelcol_exporter_send_failed_spans[5m]) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector trace exportлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "OTel Collectorк°Җ span exportм—җ мӢӨнҢЁн•ҳкі  мһҲм–ҙмҡ”. exporter={{ $labels.exporter }}, instance={{ $labels.instance }} мқҳ downstream endpointмҷҖ мқёмҰқ м •ліҙлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: LokiRequestErrors
        expr: sum by (job, instance) (rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m])) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Loki 5xx responseлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "job={{ $labels.job }}, instance={{ $labels.instance }} мқҳ Lokiк°Җ 5xx responseлҘј л°ҳнҷҳн•ҳкі  мһҲм–ҙмҡ”. Loki logмҷҖ storage мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: LokiDiscardedSamples
        expr: sum by (job, instance) (rate(loki_discarded_samples_total[5m])) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Loki discarded sampleмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "job={{ $labels.job }}, instance={{ $labels.instance }} мқҳ Lokiк°Җ incoming log sampleмқ„ discardн•ҳкі  мһҲм–ҙмҡ”. rate limit, label cardinality, payload нҒ¬кё°лҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: SSLCertificateExpiresSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate л§ҢлЈҢмқјмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "instance={{ $labels.instance }} мқҳ SSL certificateк°Җ 14мқј мқҙлӮҙм—җ л§ҢлЈҢлҸјмҡ”. к°ұмӢ  мқјм •кіј мһҗлҸҷ к°ұмӢ  мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ExternalHttpHealthCheckFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "External HTTP health checkлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "instance={{ $labels.instance }} мқҳ blackbox HTTP checkк°Җ 3л¶„ мқҙмғҒ мӢӨнҢЁн–Ҳм–ҙмҡ”. endpoint, DNS, TLS мғҒнғңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."

      - alert: ApiHealthCheckFailed
        expr: probe_success{instance=~".*/actuator/health"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API health checkлҘј нҷ•мқён•ҙмЈјм„ёмҡ”"
          description: "instance={{ $labels.instance }} мқҳ actuator health checkк°Җ 2л¶„ мқҙмғҒ мӢӨнҢЁн–Ҳм–ҙмҡ”. app мғҒнғңмҷҖ dependency healthлҘј нҷ•мқён•ҙмЈјм„ёмҡ”."
