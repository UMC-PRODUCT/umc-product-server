groups:
  - name: umc-product.dashboard-services
    rules:
      - record: umc_product_service_fallback_info
        expr: vector(1)
        labels:
          application: local-umc-product
          service_name: local-umc-product

      - record: umc_product_service_fallback_info
        expr: vector(1)
        labels:
          application: dev-umc-product
          service_name: dev-umc-product

      - record: umc_product_service_fallback_info
        expr: vector(1)
        labels:
          application: prod-umc-product
          service_name: prod-umc-product

  - name: umc-product.availability
    rules:
      - alert: ApiServerDown
        expr: up{job=~".*umc.*|.*api.*|.*server.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API server target 연결을 확인해주세요"
          description: "Prometheus가 job={{ $labels.job }}, instance={{ $labels.instance }} 를 scrape하지 못하고 있어요. target 상태와 네트워크를 확인해주세요."

      # - alert: NodeExporterDown
      #   expr: up{job="node-exporter"} == 0
      #   for: 3m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "Node exporter is down"
      #     description: "Host metrics are not being scraped from {{ $labels.instance }}."

      - alert: PrometheusTargetDown
        expr: up{job!="node-exporter"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target 연결을 확인해주세요"
          description: "job={{ $labels.job }}, instance={{ $labels.instance }} target을 3분 이상 scrape하지 못했어요. exporter와 네트워크 상태를 확인해주세요."

      - alert: PostgreSQLDown
        expr: up{job=~".*postgres.*"} == 0 or pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL 연결을 확인해주세요"
          description: "PostgreSQL exporter가 database unavailable 상태를 보냈어요. job={{ $labels.job }}, instance={{ $labels.instance }} 의 DB와 exporter를 확인해주세요."

      - alert: RedisDown
        expr: up{job=~".*redis.*|.*valkey.*"} == 0 or redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis/Valkey 연결을 확인해주세요"
          description: "Redis/Valkey exporter가 cache unavailable 상태를 보냈어요. job={{ $labels.job }}, instance={{ $labels.instance }} 의 cache와 exporter를 확인해주세요."

      - alert: OTelCollectorDown
        expr: up{job=~".*otel.*|.*collector.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OTel Collector 수신 상태를 확인해주세요"
          description: "OTel Collector를 통한 telemetry ingestion이 멈췄어요. job={{ $labels.job }}, instance={{ $labels.instance }} 상태를 확인해주세요."

      - alert: LokiDown
        expr: up{job=~".*loki.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Loki 연결을 확인해주세요"
          description: "Prometheus가 Loki를 scrape하지 못하고 있어요. instance={{ $labels.instance }} 의 Loki 상태를 확인해주세요."

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus self-scrape를 확인해주세요"
          description: "Prometheus가 자기 자신을 scrape하지 못하고 있어요. instance={{ $labels.instance }} 의 Prometheus 상태를 확인해주세요."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager 연결을 확인해주세요"
          description: "Alert delivery가 지연될 수 있어요. instance={{ $labels.instance }} 의 Alertmanager 상태를 확인해주세요."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Grafana 연결을 확인해주세요"
          description: "Prometheus가 Grafana를 scrape하지 못하고 있어요. instance={{ $labels.instance }} 의 Grafana 상태를 확인해주세요."

  - name: umc-product.host
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage가 80%를 넘었어요"
          description: "instance={{ $labels.instance }} 의 CPU usage가 10분 이상 80%를 넘었어요. 높은 process와 최근 배포를 확인해주세요."

      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "CPU usage가 90%를 넘었어요"
          description: "instance={{ $labels.instance }} 의 CPU usage가 10분 이상 90%를 넘었어요. 높은 process와 최근 배포를 확인해주세요."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage가 85%를 넘었어요"
          description: "instance={{ $labels.instance }} 의 memory usage가 10분 이상 85%를 넘었어요. memory 증가 원인과 OOM log를 확인해주세요."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage가 95%를 넘었어요"
          description: "instance={{ $labels.instance }} 의 memory usage가 10분 이상 95%를 넘었어요. memory 증가 원인과 OOM log를 확인해주세요."

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage가 80%를 넘었어요"
          description: "instance={{ $labels.instance }}, mountpoint={{ $labels.mountpoint }} 의 disk usage가 10분 이상 80%를 넘었어요. log, chunk, volume 사용량을 확인해주세요."

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage가 90%를 넘었어요"
          description: "instance={{ $labels.instance }}, mountpoint={{ $labels.mountpoint }} 의 disk usage가 10분 이상 90%를 넘었어요. 불필요한 파일 정리와 volume 증설을 검토해주세요."

      - alert: LowDiskFreeSpace
        expr: node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} < 10 * 1024 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk free space가 10GB 미만이에요"
          description: "instance={{ $labels.instance }}, mountpoint={{ $labels.mountpoint }} 의 disk free space가 10GB 미만이에요. retention 설정과 volume 여유 공간을 확인해주세요."

      - alert: ContainerRestarted
        expr: changes(container_start_time_seconds{name!=""}[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container 재시작을 확인해주세요"
          description: "container={{ $labels.name }} 이 최근 10분 안에 재시작됐어요. instance={{ $labels.instance }} 의 container log와 restart reason을 확인해주세요."

  - name: umc-product.api
    rules:
      - alert: ApiHigh5xxErrorRatio
        expr: |
          (
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count{status=~"5.."}[5m]))
            /
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m]))
          ) > 0.05
          and
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx ratio가 5%를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 에서 5분 이상 API request 중 5xx 비율이 5%를 넘었어요. 최근 배포와 error log를 확인해주세요."

      - alert: ApiHigh5xxErrorCount
        expr: sum by (application, service_name) (increase(http_server_requests_milliseconds_count{status=~"5.."}[5m])) > 10
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx count가 높아요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 에서 최근 5분 동안 server error가 10건을 넘었어요. 주요 route와 error log를 확인해주세요."

      - alert: ApiRouteHigh5xxErrorCount
        expr: sum by (application, service_name, method, uri) (increase(http_server_requests_milliseconds_count{status=~"5.."}[5m])) > 5
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "API route 5xx count를 확인해주세요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, route={{ $labels.method }} {{ $labels.uri }} 에서 최근 5분 동안 server error가 5건을 넘었어요. 해당 route의 error log를 확인해주세요."

      - alert: ApiHigh4xxErrorRatio
        expr: |
          (
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count{status=~"4.."}[5m]))
            /
            sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m]))
          ) > 0.3
          and
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API 4xx ratio가 30%를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 에서 10분 이상 API request 중 4xx 비율이 30%를 넘었어요. client request 변화와 인증/입력 오류를 확인해주세요."

      - alert: ApiHighP95LatencyMilliseconds
        expr: histogram_quantile(0.95, sum by (application, service_name, le) (rate(http_server_requests_milliseconds_bucket[5m]))) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency가 2초를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 의 millisecond metric 기준 p95 API latency가 5분 이상 2초를 넘었어요. 느린 route와 DB/API 외부 호출을 확인해주세요."

      - alert: ApiHighP95LatencySeconds
        expr: histogram_quantile(0.95, sum by (application, service_name, le) (rate(http_server_requests_seconds_bucket[5m]))) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency가 2초를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 의 second metric 기준 p95 API latency가 5분 이상 2초를 넘었어요. 느린 route와 DB/API 외부 호출을 확인해주세요."

      - alert: ApiHighP99LatencyMilliseconds
        expr: histogram_quantile(0.99, sum by (application, service_name, le) (rate(http_server_requests_milliseconds_bucket[5m]))) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency가 5초를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 의 millisecond metric 기준 p99 API latency가 5분 이상 5초를 넘었어요. 느린 route와 DB/API 외부 호출을 확인해주세요."

      - alert: ApiHighP99LatencySeconds
        expr: histogram_quantile(0.99, sum by (application, service_name, le) (rate(http_server_requests_seconds_bucket[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency가 5초를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 의 second metric 기준 p99 API latency가 5분 이상 5초를 넘었어요. 느린 route와 DB/API 외부 호출을 확인해주세요."

      - alert: ApiTrafficDropped
        expr: |
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m]))
          <
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m] offset 1h)) * 0.2
          and
          sum by (application, service_name) (rate(http_server_requests_milliseconds_count[5m] offset 1h)) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API traffic이 급감했어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 의 현재 request rate가 1시간 전의 20% 미만이에요. 배포, gateway, upstream routing을 확인해주세요."

      - alert: LoginTrafficSpike
        expr: sum by (application, service_name) (rate(http_server_requests_milliseconds_count{uri=~".*login.*"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Login API traffic이 높아요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }} 의 login 관련 API traffic이 5분 이상 초당 5 request를 넘었어요. 비정상 재시도와 OAuth 상태를 확인해주세요."

      - alert: ApiRouteTrafficSpike
        expr: sum by (application, service_name, method, uri) (rate(http_server_requests_milliseconds_count[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API route traffic이 높아요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, route={{ $labels.method }} {{ $labels.uri }} traffic이 5분 이상 초당 10 request를 넘었어요. 호출 주체와 최근 변경을 확인해주세요."

      - record: umc_product:http_requests:top10_10m
        expr: topk(10, sum by (application, service_name, method, uri) (increase(http_server_requests_milliseconds_count[10m])))

      - record: umc_product:http_request_p95:top10_5m
        expr: topk(10, histogram_quantile(0.95, sum by (application, service_name, le, method, uri) (rate(http_server_requests_milliseconds_bucket[5m]))))

      - record: umc_product:http_request_p95_seconds:top10_5m
        expr: topk(10, histogram_quantile(0.95, sum by (application, service_name, le, method, uri) (rate(http_server_requests_seconds_bucket[5m]))))

  - name: umc-product.database-cache
    rules:
      - alert: DbConnectionPoolHighUsage
        expr: sum by (application, service_name, instance, pool) (hikaricp_connections_active) / sum by (application, service_name, instance, pool) (hikaricp_connections_max) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB connection pool usage가 80%를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} 의 HikariCP active connection 비율이 5분 이상 80%를 넘었어요. 느린 query와 connection 누수를 확인해주세요."

      - alert: DbConnectionPoolHighUsage
        expr: sum by (application, service_name, instance, pool) (hikaricp_connections_active) / sum by (application, service_name, instance, pool) (hikaricp_connections_max) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool usage가 95%를 넘었어요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} 의 HikariCP active connection 비율이 5분 이상 95%를 넘었어요. 느린 query와 connection 누수를 먼저 확인해주세요."

      - alert: DbConnectionPending
        expr: sum by (application, service_name, instance, pool) (hikaricp_connections_pending) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "DB connection 대기를 확인해주세요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} 에서 HikariCP connection을 기다리는 request가 3분 이상 남아 있어요. pool size, active query, DB 응답 시간을 확인해주세요."

      - alert: DbConnectionTimeout
        expr: sum by (application, service_name, instance, pool) (increase(hikaricp_connections_timeout_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DB connection timeout을 확인해주세요"
          description: "service={{ $labels.service_name }}, application={{ $labels.application }}, instance={{ $labels.instance }}, pool={{ $labels.pool }} 에서 최근 5분 안에 HikariCP connection acquisition timeout이 있었어요. DB 상태와 connection pool 포화 여부를 확인해주세요."

      - alert: RedisMemoryHighUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis/Valkey memory usage가 80%를 넘었어요"
          description: "instance={{ $labels.instance }} 의 Redis/Valkey memory usage가 10분 이상 80%를 넘었어요. key 증가량과 eviction 정책을 확인해주세요."

      - alert: RedisRejectedConnections
        expr: increase(redis_rejected_connections_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Redis rejected connection을 확인해주세요"
          description: "instance={{ $labels.instance }} 의 Redis/Valkey에서 최근 5분 안에 rejected connection이 있었어요. maxclients와 client 재시도를 확인해주세요."

  - name: umc-product.observability
    rules:
      - alert: OTelCollectorLogExportFailures
        expr: rate(otelcol_exporter_send_failed_log_records[5m]) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector log export를 확인해주세요"
          description: "OTel Collector가 log record export에 실패하고 있어요. exporter={{ $labels.exporter }}, instance={{ $labels.instance }} 의 downstream endpoint와 인증 정보를 확인해주세요."

      - alert: OTelCollectorMetricExportFailures
        expr: rate(otelcol_exporter_send_failed_metric_points[5m]) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector metric export를 확인해주세요"
          description: "OTel Collector가 metric point export에 실패하고 있어요. exporter={{ $labels.exporter }}, instance={{ $labels.instance }} 의 downstream endpoint와 인증 정보를 확인해주세요."

      - alert: OTelCollectorTraceExportFailures
        expr: rate(otelcol_exporter_send_failed_spans[5m]) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector trace export를 확인해주세요"
          description: "OTel Collector가 span export에 실패하고 있어요. exporter={{ $labels.exporter }}, instance={{ $labels.instance }} 의 downstream endpoint와 인증 정보를 확인해주세요."

      - alert: LokiRequestErrors
        expr: sum by (job, instance) (rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m])) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Loki 5xx response를 확인해주세요"
          description: "job={{ $labels.job }}, instance={{ $labels.instance }} 의 Loki가 5xx response를 반환하고 있어요. Loki log와 storage 상태를 확인해주세요."

      - alert: LokiDiscardedSamples
        expr: sum by (job, instance) (rate(loki_discarded_samples_total[5m])) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Loki discarded sample을 확인해주세요"
          description: "job={{ $labels.job }}, instance={{ $labels.instance }} 의 Loki가 incoming log sample을 discard하고 있어요. rate limit, label cardinality, payload 크기를 확인해주세요."

      - alert: SSLCertificateExpiresSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate 만료일을 확인해주세요"
          description: "instance={{ $labels.instance }} 의 SSL certificate가 14일 이내에 만료돼요. 갱신 일정과 자동 갱신 상태를 확인해주세요."

      - alert: ExternalHttpHealthCheckFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "External HTTP health check를 확인해주세요"
          description: "instance={{ $labels.instance }} 의 blackbox HTTP check가 3분 이상 실패했어요. endpoint, DNS, TLS 상태를 확인해주세요."

      - alert: ApiHealthCheckFailed
        expr: probe_success{instance=~".*/actuator/health"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API health check를 확인해주세요"
          description: "instance={{ $labels.instance }} 의 actuator health check가 2분 이상 실패했어요. app 상태와 dependency health를 확인해주세요."
