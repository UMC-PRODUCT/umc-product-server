# Prometheus config — 자체 호스팅 메트릭 백엔드 (ADR-014 Phase 1)
#
# 본 스택에서 prometheus 는 두 가지 수신 경로를 가진다.
#   1) OTLP write receiver: /api/v1/otlp/v1/metrics
#      앱 / otel-collector 가 OTLP push 로 메트릭을 보낼 수 있다.
#      활성화는 docker-compose 의 --enable-feature=otlp-write-receiver 가 담당.
#   2) Scrape (pull): 본 파일의 scrape_configs.
#      prometheus / node-exporter / 내부 모니터링 컴포넌트를 scrape 한다.
#      앱 메트릭은 OTLP push 로 받는다.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: umc-product-self-hosted

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]

  # macOS 로컬은 Homebrew node_exporter 를 host 에 띄우고, Linux 운영은 compose profile 의
  # node-exporter 컨테이너를 scrape 한다. os 라벨은 Grafana 대시보드와 host alert 대상 구분에 사용한다.
  - job_name: node-exporter
    static_configs:
      - targets: [ 'host.docker.internal:9100' ]
        labels:
          os: macos
      - targets: [ 'node-exporter:9100' ]
        labels:
          os: linux

  - job_name: alertmanager
    static_configs:
      - targets: [ 'alertmanager:9093' ]

  - job_name: grafana
    static_configs:
      - targets: [ 'grafana:3000' ]

  - job_name: loki
    static_configs:
      - targets: [ 'loki:3100' ]

  - job_name: otel-collector
    static_configs:
      - targets: [ 'otel-collector:8888' ]

# alerting / rule_files (Commit 5).
alerting:
  alertmanagers:
    - static_configs:
        - targets: [ 'alertmanager:9093' ]

rule_files:
  - /etc/prometheus/rules/*.yml
