# 자체 호스팅 모니터링 스택 (ADR-014 Phase 1)
#
# 본 compose 파일은 자체 호스팅 백엔드와 OTLP 게이트웨이, Grafana,
# Alertmanager, node-exporter 를 함께 정의한다.
#
# 동작 검증:
#   cp env.example .env && docker compose up -d
name: umc-product-monitoring

services:

  # --- Metric backend ---
  # OTLP write receiver 가 활성화되어 있어, 앱 / otel-collector 가
  # http://prometheus:9090/api/v1/otlp/v1/metrics 로 OTLP push 를 보낼 수 있다.
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: umc-product-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.enable-otlp-receiver
      - --web.enable-lifecycle
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-19090}:9090"
    networks: [monitoring]
    restart: unless-stopped

  # --- Trace backend ---
  # 4317 (gRPC) / 4318 (HTTP) 로 OTLP 직접 수신 가능. 단, 운영 앱은 본 ADR-014 의
  # 권장대로 otel-collector 를 거치게 하고, tempo 의 OTLP 포트는 호스트로 노출만 해둔다.
  tempo:
    image: grafana/tempo:2.10.5
    container_name: umc-product-tempo
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${TEMPO_HTTP_PORT:-13200}:3200"
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${TEMPO_OTLP_GRPC_PORT:-14317}:4317"
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${TEMPO_OTLP_HTTP_PORT:-14318}:4318"
    networks: [monitoring]
    restart: unless-stopped

  # --- OTLP 게이트웨이 ---
  # 앱은 OTEL_URL 등 환경변수만 본 collector 의 endpoint 로 바꾸면 된다.
  # collector 가 prometheus / tempo / loki 로 신호를 분배한다.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: umc-product-otel-collector
    command: [ "--config=/etc/otel-collector/config.yaml" ]
    environment:
      OTEL_INGEST_TOKEN: ${OTEL_INGEST_TOKEN:?OTEL_INGEST_TOKEN must be set}
    volumes:
      - ./config/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "${OTEL_BIND_ADDRESS:-127.0.0.1}:${OTEL_OTLP_GRPC_PORT:-4317}:4317"
      - "${OTEL_BIND_ADDRESS:-127.0.0.1}:${OTEL_OTLP_HTTP_PORT:-4318}:4318"
    depends_on:
      - prometheus
      - tempo
      - loki
    networks: [monitoring]
    restart: unless-stopped

  # --- Log backend ---
  # 앱 로그는 OTLP logs 로 collector 에 들어온 뒤 Loki 의 OTLP receiver 로 전달된다.
  # 내부 수신 경로: http://loki:3100/otlp/v1/logs
  loki:
    image: grafana/loki:3.7.2
    container_name: umc-product-loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - ./config/loki/rules:/loki/rules:ro
      - loki-data:/loki
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${LOKI_PORT:-13100}:3100"
    networks: [monitoring]
    restart: unless-stopped

  # --- Visualization ---
  # provisioning/ 디렉터리가 컨테이너 안의 /etc/grafana/provisioning 으로 마운트되어
  # datasource (datasources.yaml) 와 dashboard provider (dashboards/dashboards.yaml) 가
  # 컨테이너 부팅 시 자동 등록된다. 실제 dashboard JSON 들은 dashboards/ 로 마운트.
  grafana:
    image: grafana/grafana:13.0.1
    container_name: umc-product-grafana
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:13000}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=${GRAFANA_SERVER_ROOT_URL:-}
      # CloudWatch datasource는 AWS SDK 기본 인증 체인을 사용한다.
      # 자격 증명 변수가 없으면 컨테이너에 전달하지 않아 기본 인증 체인의 다음 단계를 사용할 수 있다.
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    networks: [monitoring]
    restart: unless-stopped

  # --- Alerting ---
  # prometheus / loki 의 alerting rule 발화를 Discord webhook 으로 전송.
  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: umc-product-alertmanager
    command:
      - --config.file=/etc/alertmanager/config.yml
      - --storage.path=/alertmanager
    configs:
      - source: discord-alert-webhook
        target: /etc/alertmanager/secrets/discord-webhook
    volumes:
      - ./config/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${ALERTMANAGER_PORT:-19093}:9093"
    networks: [monitoring]
    restart: unless-stopped

  # --- Host metrics ---
  # 호스트 (홈서버) 자체의 CPU / disk / network / filesystem 메트릭을 prometheus 가 scrape.
  # 디스크 임계 알람 (Loki / Tempo chunk 누적) 의 데이터 소스.
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: umc-product-node-exporter
    profiles: [ "linux" ]
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:${NODE_EXPORTER_PORT:-19100}:9100"
    networks: [monitoring]
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
  alertmanager-data:

networks:
  monitoring:
    name: umc-product-monitoring
    driver: bridge

configs:
  discord-alert-webhook:
    content: ${DISCORD_ALERT_WEBHOOK:-http://127.0.0.1:65535/alertmanager-discord-webhook-not-configured}
