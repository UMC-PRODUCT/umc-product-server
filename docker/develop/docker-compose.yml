# .env는 Docker Compose 치환 전용, app.env는 애플리케이션 런타임 환경변수 전용입니다.

services:
  nginx:
    container_name: ${NGINX_CONTAINER_NAME}
    image: nginx:1.31.1
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    expose:
      - "${APP_PORT:-8080}"
      - "${MANAGEMENT_PORT:-9090}"
    env_file:
      - app.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${APP_PORT:-8080}
      MANAGEMENT_PORT: ${MANAGEMENT_PORT:-9090}
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "http://localhost:${MANAGEMENT_PORT:-9090}/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
