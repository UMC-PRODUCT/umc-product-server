# Alertmanager — 자체 호스팅 알람 라우팅 (ADR-014 Phase 1)
#
# Prometheus / Loki 의 alerting rule 이 발화하면 본 alertmanager 가 라우팅을 담당한다.
# 디폴트 라우트는 Discord webhook 으로 전송 — application 코드의 webhook URL
# (app.webhook.discord) 과 분리되어 인프라 알람 전용으로 사용한다.
#
# 운영 주의:
# - DISCORD_ALERT_WEBHOOK 가 비어 있으면 docker-compose.yml 의 config content 가 로컬
#   dummy URL 파일을 주입해 Alertmanager 기동만 성공하게 한다. 운영 배포 전에는 반드시
#   실제 webhook 으로 교체할 것.
# - Phase 2 에서 PagerDuty / 별도 채널 라우팅이 필요해지면 routes 트리 확장.

global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: [ alertname, severity ]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: discord
    discord_configs:
      - send_resolved: true
        webhook_url_file: /etc/alertmanager/secrets/discord-webhook
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          • {{ .Annotations.summary }}{{ if .Annotations.description }}
            {{ .Annotations.description }}{{ end }}
          {{ end }}

inhibit_rules:
  # 동일 alertname 의 critical 발화 중에는 warning 알람을 중복 전송하지 않는다.
  - source_matchers: [ 'severity="critical"' ]
    target_matchers: [ 'severity="warning"' ]
    equal: [ 'alertname' ]
