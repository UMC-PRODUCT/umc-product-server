# Loki config — 자체 호스팅 로그 백엔드 (ADR-014 Phase 1, ADR-016)
#
# 앱 로그는 OTel Collector 에서 OTLP logs 로 들어오며, Loki 의 /otlp/v1/logs
# receiver 가 저장한다. Loki OTLP 기본 라벨은 service_name 등을 사용하고,
# uriTemplate / statusCode / durationMs 같은 로그 속성은 structured metadata 로 검색한다.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 30d 보존. 디스크 사용량을 보고 Phase 2 운영 데이터로 결정 (ADR-014 §Phase 2).
  retention_period: 720h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # OTLP logs 가 들고 들어오는 resource attribute 를 structured metadata 로 받기 위해 필수.
  allow_structured_metadata: true

ruler:
  alertmanager_url: http://alertmanager:9093
